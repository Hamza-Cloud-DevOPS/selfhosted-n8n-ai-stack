volumes:
  qdrant_storage:

networks:
  n8n-net:
    external: true

services:
  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    hostname: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - n8n-net
