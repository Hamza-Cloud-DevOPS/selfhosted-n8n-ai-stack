# Portainer — Panel de gestión de Docker
# Permite ver, gestionar y monitorear contenedores desde una interfaz web
# Repo: https://github.com/portainer/portainer

services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - portainer_data:/data
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  portainer_data:
