# PostgreSQL con extensión pgvector para búsquedas semánticas
# Usado junto con LocalAI embeddings para almacenar vectores

# IMPORTANTE: Después de levantar el container, ejecutar:
#   docker exec -it Postgres_Vector psql -U <user> -d <db> -c "CREATE EXTENSION IF NOT EXISTS vector;"
# Esto activa la extensión pgvector necesaria para búsquedas semánticas con embeddings.

services:
  postgres-vector:
    image: ankane/pgvector:latest
    container_name: Postgres_Vector
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    networks:
      - n8n-net
      - db

volumes:
  pgvector_data:

networks:
  n8n-net:
    external: true
  db:
    external: true
